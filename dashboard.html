<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvet & Vine — Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --cream: #FAF7F2;
  --warm:  #FDF9F4;
  --velvet: #6B2D3E;
  --velvet-deep: #4A1E2A;
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --charcoal: #2C2C2C;
  --muted: #8A7E74;
  --border: #E8DDD4;
  --green: #00A651;
  --red: #E53E3E;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Jost', sans-serif;
  background: var(--cream);
  color: var(--charcoal);
  min-height: 100vh;
}

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--velvet-deep), #3D1828);
  padding: 20px;
}
.login-card {
  background: white;
  border-radius: 16px;
  width: 100%;
  max-width: 380px;
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,.35);
}
.login-header {
  background: linear-gradient(135deg, var(--velvet-deep), var(--velvet));
  padding: 36px 32px 28px;
  text-align: center;
}
.login-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 400;
  color: white;
  letter-spacing: 1px;
}
.login-header p { font-size: 12px; color: rgba(255,255,255,.55); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
.login-body { padding: 32px; }
.login-field { margin-bottom: 16px; }
.login-field label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
.login-field input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: 8px; font-family: 'Jost', sans-serif; font-size: 14px;
  color: var(--charcoal); background: var(--cream); outline: none; transition: border-color .2s;
}
.login-field input:focus { border-color: var(--velvet); }
.login-btn {
  width: 100%; background: var(--velvet); color: white; border: none;
  padding: 13px; border-radius: 8px; font-family: 'Jost', sans-serif;
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; font-weight: 700; transition: background .2s; margin-top: 4px;
}
.login-btn:hover { background: var(--velvet-deep); }
.login-error { display: none; background: #FEE2E2; color: #991B1B; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; text-align: center; }
.login-error.show { display: block; }

/* ── DASHBOARD ── */
#dashboard { display: none; }

.topbar {
  background: var(--velvet-deep);
  padding: 0 40px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  color: white;
  font-weight: 400;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-brand span { color: var(--gold); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-sub { font-size: 11px; color: rgba(255,255,255,.45); letter-spacing: 2px; text-transform: uppercase; }
.refresh-btn {
  background: rgba(255,255,255,.1); color: white; border: 1px solid rgba(255,255,255,.2);
  border-radius: 4px; padding: 6px 16px; font-size: 11px; letter-spacing: 1.5px;
  text-transform: uppercase; cursor: pointer; font-family: 'Jost', sans-serif; transition: background .2s;
}
.refresh-btn:hover { background: rgba(255,255,255,.18); }
.logout-btn {
  background: none; color: rgba(255,255,255,.5); border: none;
  font-size: 12px; cursor: pointer; font-family: 'Jost', sans-serif; transition: color .2s;
}
.logout-btn:hover { color: white; }

.main { max-width: 1280px; margin: 0 auto; padding: 36px 40px 60px; }

/* Status pill */
.status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.status-text { font-size: 13px; color: var(--muted); }
.last-updated { font-size: 12px; color: var(--muted); margin-left: auto; }

/* Metric cards */
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.metric-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
}
.metric-card::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--velvet);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .3s;
}
.metric-card:hover::before { transform: scaleX(1); }
.metric-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
.metric-val { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; color: var(--charcoal); line-height: 1; }
.metric-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
.metric-change { font-size: 12px; margin-top: 6px; font-weight: 500; }
.metric-change.up { color: var(--green); }
.metric-change.neutral { color: var(--muted); }

/* Section heading */
.sec-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 16px; font-weight: 600;
  display: flex; align-items: center; gap: 10px;
}
.sec-label::before { content: ''; display: block; width: 18px; height: 1px; background: var(--muted); }

/* Grid layouts */
.two-col { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; margin-bottom: 20px; }
.two-col-equal { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

.panel {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 26px 28px;
}

/* Bar rows */
.bar-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 13px; }
.bar-item:last-child { margin-bottom: 0; }
.bar-name { width: 130px; color: var(--charcoal); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; font-size: 13px; }
.bar-track { flex: 1; background: var(--cream); border-radius: 3px; height: 7px; }
.bar-fill { height: 7px; border-radius: 3px; background: var(--velvet); opacity: .75; transition: width .6s ease; }
.bar-fill.gold { background: var(--gold); }
.bar-fill.green { background: var(--green); opacity: 1; }
.bar-count { width: 32px; text-align: right; color: var(--muted); font-size: 12px; flex-shrink: 0; }

/* Device donut */
.device-list { list-style: none; }
.device-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.device-item:last-child { border-bottom: none; }
.device-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
.device-name { display: flex; align-items: center; color: var(--charcoal); }
.device-pct { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--charcoal); }
.device-count { font-size: 12px; color: var(--muted); }

/* Recent table */
.visits-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.visits-table th {
  text-align: left; color: var(--muted); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; font-weight: 600; padding: 0 12px 12px 0;
  border-bottom: 1px solid var(--border);
}
.visits-table td { padding: 11px 12px 11px 0; border-bottom: 1px solid var(--border); color: var(--charcoal); vertical-align: middle; }
.visits-table tr:last-child td { border-bottom: none; }
.visits-table tr:hover td { background: var(--cream); }
.badge { display: inline-block; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
.badge.desktop { background: #E8EDF7; color: #2D4A8A; }
.badge.mobile  { background: #E8F5EE; color: #1A6640; }
.badge.tablet  { background: #FDF3E0; color: #8A5A00; }
.badge.unknown { background: var(--cream); color: var(--muted); border: 1px solid var(--border); }
.page-path { font-family: 'Courier New', monospace; font-size: 12px; color: var(--velvet); }
.ref-source { font-size: 12px; color: var(--muted); }
.time-val { font-size: 12px; color: var(--muted); white-space: nowrap; }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-state .big { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.7; }

/* Chart wrapper */
.chart-wrap { position: relative; height: 220px; }

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

@media(max-width: 900px) {
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .two-col, .two-col-equal { grid-template-columns: 1fr; }
  .main { padding: 24px 20px 48px; }
  .topbar { padding: 0 20px; }
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-header">
      <h1>Velvet <span style="color:var(--gold)">&</span> Vine</h1>
      <p>Analytics Dashboard</p>
    </div>
    <div class="login-body">
      <div class="login-error" id="login-error">Incorrect password — try again</div>
      <div class="login-field">
        <label>Backend URL</label>
        <input type="text" id="login-url" placeholder="https://your-app.onrender.com" autocomplete="off">
      </div>
      <div class="login-field">
        <label>Dashboard Password</label>
        <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">Enter Dashboard</button>
      <p style="font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6">
        Set your password in <code style="font-size:11px;background:var(--cream);padding:1px 6px;border-radius:3px;">DASHBOARD_PASSWORD</code> in your <code style="font-size:11px;background:var(--cream);padding:1px 6px;border-radius:3px;">.env</code> file
      </p>
    </div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">Velvet <span>&</span> Vine <span style="color:rgba(255,255,255,.3);font-size:14px;margin-left:4px">/ Analytics</span></div>
    <div class="topbar-right">
      <span class="topbar-sub" id="topbar-count"></span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="main">
    <div id="dash-content">
      <div class="loading">Loading analytics data...</div>
    </div>
  </div>
</div>

<script>
let BACKEND_URL = '';
let DASHBOARD_PWD = '';
let chartDaily = null;

// ── LOGIN ────────────────────────────────────────────────────────────────────
document.getElementById('login-pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const url = document.getElementById('login-url').value.trim().replace(/\/+$/, '');
  const pwd = document.getElementById('login-pwd').value.trim();
  if (!url || !pwd) return;

  const btn = document.getElementById('login-btn');
  btn.textContent = 'Connecting…';
  btn.disabled = true;

  try {
    const r = await fetch(url + '/analytics', {
      headers: { 'x-dashboard-password': pwd }
    });
    if (r.status === 401) {
      document.getElementById('login-error').classList.add('show');
      btn.textContent = 'Enter Dashboard'; btn.disabled = false;
      return;
    }
    const data = await r.json();
    if (!data.ok) throw new Error('bad response');

    BACKEND_URL   = url;
    DASHBOARD_PWD = pwd;
    try { localStorage.setItem('vv_dash_url', url); } catch(e) {}

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDashboard(data.stats);
  } catch(e) {
    document.getElementById('login-error').textContent = 'Could not connect — check the URL';
    document.getElementById('login-error').classList.add('show');
    btn.textContent = 'Enter Dashboard'; btn.disabled = false;
  }
}

function logout() {
  BACKEND_URL = ''; DASHBOARD_PWD = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-pwd').value = '';
}

async function loadData() {
  if (!BACKEND_URL) return;
  try {
    const r = await fetch(BACKEND_URL + '/analytics', {
      headers: { 'x-dashboard-password': DASHBOARD_PWD }
    });
    const data = await r.json();
    if (data.ok) renderDashboard(data.stats);
  } catch(e) {}
}

// Pre-fill URL from localStorage
try {
  const saved = localStorage.getItem('vv_dash_url');
  if (saved) document.getElementById('login-url').value = saved;
} catch(e) {}

// ── RENDER ───────────────────────────────────────────────────────────────────
function getDevice(ua) {
  if (!ua) return 'Unknown';
  if (/mobile/i.test(ua)) return 'Mobile';
  if (/tablet|ipad/i.test(ua)) return 'Tablet';
  return 'Desktop';
}

function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' }) + ' ' +
         d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

function fmtNum(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return String(n);
}

function renderBars(items, labelKey, countKey, total, colorClass) {
  if (!items.length) return '<div class="empty-state"><p>No data yet</p></div>';
  return items.map(item => {
    const pct = total ? Math.round(item[countKey] / total * 100) : 0;
    const label = (item[labelKey] || '—');
    const short = label.length > 32 ? label.slice(0,32)+'…' : label;
    return `<div class="bar-item">
      <div class="bar-name" title="${label}">${short}</div>
      <div class="bar-track"><div class="bar-fill ${colorClass||''}" style="width:${pct}%"></div></div>
      <div class="bar-count">${item[countKey]}</div>
    </div>`;
  }).join('');
}

function renderDashboard(s) {
  const now = new Date();
  document.getElementById('topbar-count').textContent = s.total.toLocaleString() + ' total visits';

  const content = document.getElementById('dash-content');
  content.innerHTML = `
    <div class="status-row">
      <span class="live-dot"></span>
      <span class="status-text">Live tracking active</span>
      <span class="last-updated">Updated ${now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'})}</span>
    </div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Total visits</div>
        <div class="metric-val">${s.total.toLocaleString()}</div>
        <div class="metric-sub">All time</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Today</div>
        <div class="metric-val">${s.todayV}</div>
        <div class="metric-sub">${now.toLocaleDateString('en-GB',{weekday:'long'})}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">This week</div>
        <div class="metric-val">${s.weekV}</div>
        <div class="metric-sub">Last 7 days</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">This month</div>
        <div class="metric-val">${s.monthV}</div>
        <div class="metric-sub">Last 30 days</div>
      </div>
    </div>

    <div class="two-col">
      <div class="panel">
        <div class="sec-label">Daily visits — last 30 days</div>
        <div class="chart-wrap"><canvas id="chart-daily"></canvas></div>
      </div>
      <div class="panel">
        <div class="sec-label">Top pages</div>
        ${renderBars(s.topPages, 'page', 'count', s.total, '')}
      </div>
    </div>

    <div class="two-col-equal">
      <div class="panel">
        <div class="sec-label">Traffic sources</div>
        ${renderBars(s.topReferrers, 'ref', 'count', s.total, 'gold')}
      </div>
      <div class="panel">
        <div class="sec-label">Devices</div>
        ${renderDevices(s.deviceCounts, s.total)}
      </div>
    </div>

    <div class="panel">
      <div class="sec-label">Recent visits</div>
      ${renderRecent(s.recent)}
    </div>
  `;

  renderDailyChart(s.daily);
}

function renderDevices(counts, total) {
  const colors = { Desktop: '#6B2D3E', Mobile: '#00A651', Tablet: '#C9A84C', Unknown: '#8A7E74' };
  const entries = Object.entries(counts).filter(([,v]) => v > 0);
  if (!entries.length) return '<div class="empty-state"><p>No device data yet</p></div>';
  return `<ul class="device-list">${entries.map(([name, count]) => {
    const pct = total ? Math.round(count/total*100) : 0;
    return `<li class="device-item">
      <div class="device-name"><span class="device-dot" style="background:${colors[name]||'#ccc'}"></span>${name}</div>
      <div>
        <span class="device-pct">${pct}%</span>
        <span class="device-count" style="margin-left:6px">${count} visits</span>
      </div>
    </li>`;
  }).join('')}</ul>`;
}

function renderRecent(recent) {
  if (!recent.length) return '<div class="empty-state"><div class="big">📭</div><p>No visits yet.<br>Install the tracking snippet in your site\'s &lt;head&gt; to start recording visits.</p></div>';
  return `<div style="overflow-x:auto"><table class="visits-table">
    <thead><tr>
      <th>Time</th><th>Page</th><th>Source</th><th>Device</th>
    </tr></thead>
    <tbody>${recent.map(v => {
      const device = getDevice(v.ua);
      const badgeClass = device.toLowerCase();
      return `<tr>
        <td><span class="time-val">${fmtTime(v.ts)}</span></td>
        <td><span class="page-path">${(v.page||'/').slice(0,40)}</span></td>
        <td><span class="ref-source">${(v.ref||'Direct').slice(0,35)}</span></td>
        <td><span class="badge ${badgeClass}">${device}</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function renderDailyChart(daily) {
  if (chartDaily) { chartDaily.destroy(); chartDaily = null; }
  const labels = Object.keys(daily).map(d => {
    const dt = new Date(d);
    return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  });
  const data = Object.values(daily);

  const canvas = document.getElementById('chart-daily');
  if (!canvas) return;

  chartDaily = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Visits',
        data,
        backgroundColor: 'rgba(107,45,62,0.65)',
        hoverBackgroundColor: 'rgba(107,45,62,0.9)',
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.raw} visit${ctx.raw !== 1 ? 's' : ''}` }
      }},
      scales: {
        x: {
          ticks: { font: { size: 10, family: 'Jost' }, color: '#8A7E74', maxRotation: 45, autoSkip: true, maxTicksLimit: 10 },
          grid: { display: false }
        },
        y: {
          ticks: { font: { size: 11, family: 'Jost' }, color: '#8A7E74', stepSize: 1 },
          grid: { color: 'rgba(232,221,212,0.6)' },
          beginAtZero: true
        }
      }
    }
  });
}

// Auto-refresh every 60 seconds
setInterval(() => { if (BACKEND_URL) loadData(); }, 60000);
</script>
</body>
</html>
